version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wazuh-monitor-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    networks:
      - wazuh-monitor
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wazuh-monitor-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - wazuh-monitor

networks:
  wazuh-monitor:
    driver: bridge
